name: Linux E2E Test

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        description: Runner label for test execution
      docker_image_name:
        type: string
        default: 'intelgpu/ubuntu-24.04-lts2:2523.40'
        description: Docker image for test environment
      pytorch:
        type: string
        default: main
        description: PyTorch version
      python:
        type: string
        default: '3.10'
        description: Python version
      suite:
        type: string
        default: huggingface
        description: |
          Comma-separated suite list. Allowed: huggingface, timm_models,
          torchbench, pt2e. Suites not configured for the current category
          are skipped.
      dt:
        type: string
        default: float32
        description: |
          Comma-separated dtypes (used by `ondemand`/`target`/`baseline`).
          For other categories the matrix is read from
          `.ci/config/e2e_matrix.yaml`.
      mode:
        type: string
        default: inference
        description: 'Modes (used by ondemand/target/baseline): inference, training'
      scenario:
        type: string
        default: accuracy
        description: 'Scenarios (used by ondemand/target/baseline): accuracy, performance'
      model:
        type: string
        required: false
        default: ''
        description: Specific model to test (only this model runs)
      category:
        type: string
        default: default
        description: 'Category: pr, nightly, weekly, ondemand, target, baseline'
      component:
        type: string
        default: ''
        description: Component name for comparison
      component_version:
        type: string
        default: ''
        description: Component version for comparison

permissions:
  contents: read

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  GH_TOKEN: ${{ github.token }}
  HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  WORKSPACE: ${{ github.workspace }}

jobs:
  # Resolve runner
  runner:
    name: get-runner
    runs-on: ${{ inputs.runner }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
      ze_affinity_mask: ${{ steps.runner-info.outputs.ZE_AFFINITY_MASK }}
    steps:
      - name: Clean workspace
        run: sudo find . -maxdepth 1 ! -name '.' ! -name '..' -exec sudo rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get runner information
        id: runner-info
        uses: ./.github/actions/get-runner

  # E2E tests
  E2E:
    name: ${{ inputs.suite }}
    needs: runner
    runs-on: ${{ needs.runner.outputs.runner_id }}
    timeout-minutes: 3600
    container:
      image: ${{ inputs.docker_image_name }}
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
        - /opt/xpu-test/.cache:/github/home/.cache
      options: >-
        --rm
        --device=/dev/mem
        --device=/dev/dri
        --group-add video
        --security-opt seccomp=unconfined
        --cap-add=SYS_PTRACE
        --shm-size=8g
        -u ${{ needs.runner.outputs.user_id }}:${{ needs.runner.outputs.render_id }}
      env:
        ZE_AFFINITY_MASK: ${{ needs.runner.outputs.ze_affinity_mask }}
        AGENT_TOOLSDIRECTORY: /tmp/xpu-tool
    env:
      CATEGORY: ${{ inputs.category }}
      MODEL_ONLY_NAME: ${{ inputs.model }}
      WORKSPACE: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare test environment
        uses: ./.github/actions/linux-testenv
        with:
          pytorch: ${{ inputs.pytorch }}
          python: ${{ inputs.python }}
          suite: ${{ inputs.suite }}
          component: ${{ inputs.component }}
          component_version: ${{ inputs.component_version }}
          category: ${{ inputs.category }}

      # ── Suite selection: split inputs.suite into per-suite booleans ───────
      - name: Detect requested suites
        id: suites
        run: |
          IFS=',' read -ra requested <<< "${{ inputs.suite }}"
          for s in huggingface timm_models torchbench pt2e; do
            on=false
            for r in "${requested[@]}"; do
              [[ "${r// /}" == "${s}" ]] && on=true && break
            done
            echo "${s}=${on}" >> "${GITHUB_OUTPUT}"
          done

      # ── HuggingFace ───────────────────────────────────────────────────────
      - name: Resolve matrix — huggingface
        id: matrix-hf
        if: steps.suites.outputs.huggingface == 'true'
        uses: ./.github/actions/resolve-e2e-matrix
        with:
          category: ${{ inputs.category }}
          suite: huggingface
          override-dt: ${{ inputs.dt }}
          override-mode: ${{ inputs.mode }}
          override-scenario: ${{ inputs.scenario }}

      - name: Run E2E — huggingface
        if: steps.suites.outputs.huggingface == 'true' && steps.matrix-hf.outputs.enabled == 'true'
        uses: ./.github/actions/run-e2e-suite
        with:
          suite: huggingface
          dt: ${{ steps.matrix-hf.outputs.dt }}
          mode: ${{ steps.matrix-hf.outputs.mode }}
          scenario: ${{ steps.matrix-hf.outputs.scenario }}
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}

      # ── timm_models ───────────────────────────────────────────────────────
      - name: Resolve matrix — timm_models
        id: matrix-timm
        if: steps.suites.outputs.timm_models == 'true'
        uses: ./.github/actions/resolve-e2e-matrix
        with:
          category: ${{ inputs.category }}
          suite: timm_models
          override-dt: ${{ inputs.dt }}
          override-mode: ${{ inputs.mode }}
          override-scenario: ${{ inputs.scenario }}

      - name: Run E2E — timm_models
        if: steps.suites.outputs.timm_models == 'true' && steps.matrix-timm.outputs.enabled == 'true'
        uses: ./.github/actions/run-e2e-suite
        with:
          suite: timm_models
          dt: ${{ steps.matrix-timm.outputs.dt }}
          mode: ${{ steps.matrix-timm.outputs.mode }}
          scenario: ${{ steps.matrix-timm.outputs.scenario }}
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}

      # ── torchbench ────────────────────────────────────────────────────────
      - name: Resolve matrix — torchbench
        id: matrix-tb
        if: steps.suites.outputs.torchbench == 'true'
        uses: ./.github/actions/resolve-e2e-matrix
        with:
          category: ${{ inputs.category }}
          suite: torchbench
          override-dt: ${{ inputs.dt }}
          override-mode: ${{ inputs.mode }}
          override-scenario: ${{ inputs.scenario }}

      - name: Run E2E — torchbench
        if: steps.suites.outputs.torchbench == 'true' && steps.matrix-tb.outputs.enabled == 'true'
        uses: ./.github/actions/run-e2e-suite
        with:
          suite: torchbench
          dt: ${{ steps.matrix-tb.outputs.dt }}
          mode: ${{ steps.matrix-tb.outputs.mode }}
          scenario: ${{ steps.matrix-tb.outputs.scenario }}
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}

      # ── PT2E (resolves dt/scenario only; no mode) ─────────────────────────
      - name: Resolve matrix — pt2e
        id: matrix-pt2e
        if: steps.suites.outputs.pt2e == 'true'
        uses: ./.github/actions/resolve-e2e-matrix
        with:
          category: ${{ inputs.category }}
          suite: pt2e
          override-dt: ${{ inputs.dt }}
          override-scenario: ${{ inputs.scenario }}

      - name: Run PT2E
        if: steps.suites.outputs.pt2e == 'true' && steps.matrix-pt2e.outputs.enabled == 'true'
        uses: ./.github/actions/pt2e
        with:
          dt: ${{ steps.matrix-pt2e.outputs.dt }}
          scenario: ${{ steps.matrix-pt2e.outputs.scenario }}

      # ── Comparison categories use a fixed two-pass matrix ────────────────
      - name: Comparison — training (amp_fp16)
        if: inputs.category == 'target' || inputs.category == 'baseline'
        uses: ./.github/actions/run-e2e-suite
        with:
          suite: ${{ inputs.suite }}
          dt: amp_fp16
          mode: training
          scenario: accuracy,performance
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}

      - name: Comparison — inference (bfloat16)
        if: inputs.category == 'target' || inputs.category == 'baseline'
        uses: ./.github/actions/run-e2e-suite
        with:
          suite: ${{ inputs.suite }}
          dt: bfloat16
          mode: inference
          scenario: accuracy,performance
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Summarize results
        if: ${{ ! cancelled() }}
        uses: ./.github/actions/summarize-e2e
        with:
          log-dir: ${{ env.WORKSPACE }}/pytorch/inductor_log

      # ── Collect & upload artifacts ────────────────────────────────────────
      - name: Collect test artifacts
        id: collect-artifacts
        if: ${{ ! cancelled() }}
        run: |
          LOGS_DIR="${WORKSPACE}/pytorch/inductor_log"
          UPLOAD_DIR="${WORKSPACE}/upload_files"
          rm -rf "${UPLOAD_DIR}" && mkdir -p "${UPLOAD_DIR}"

          if [ -d "${LOGS_DIR}" ]; then
            cp -r "${LOGS_DIR}"/* "${UPLOAD_DIR}/" 2>/dev/null || true
            echo "Collected $(find "${UPLOAD_DIR}" -type f | wc -l) files"
          else
            echo "::warning::No inductor logs at ${LOGS_DIR}"
          fi

      - name: Upload E2E artifacts
        if: ${{ ! cancelled() && steps.collect-artifacts.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-E2E-Data-${{ inputs.category }}-${{ github.event.pull_request.number || github.sha }}-${{ inputs.suite }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/upload_files
          retention-days: 7
          if-no-files-found: warn
