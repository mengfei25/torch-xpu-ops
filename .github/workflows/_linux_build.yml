name: Linux PyTorch XPU Build

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
        default: pvc_rolling
        description: Runner label for build environment
      docker_image_name:
        type: string
        default: 'pytorch/manylinux2_28-builder:xpu-main'
        description: Docker image for build environment
      python:
        type: string
        required: true
        default: '3.10'
        description: Python version
      pytorch:
        type: string
        required: true
        default: main
        description: PyTorch version
      torch_xpu_ops:
        type: string
        default: ''
        description: >-
          Torch-xpu-ops version: main, commit/branch,
          repo@commit/repo@branch, or "pinned"
      category:
        type: string
        default: ''
        description: Category to distinguish test runs
      component:
        type: string
        default: ''
        description: 'Component name (e.g., oneapi, triton)'
      component_version:
        type: string
        default: ''
        description: Component version for comparison

permissions:
  contents: read

defaults:
  run:
    shell: bash -eo pipefail {0}

env:
  DOCKER_REGISTRY_AUTH_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  WORKSPACE: ${{ github.workspace }}
  PATH: /tmp/xpu-tool/myvenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  GCC_VERSION: '13'
  BUILD_DIR: ${{ github.workspace }}/${{ inputs.category }}
  PYTORCH_SRC: ${{ github.workspace }}/${{ inputs.category }}/pytorch
  TORCH_XPU_OPS_SRC: ${{ github.workspace }}/${{ inputs.category }}/torch-xpu-ops

jobs:
  # Resolve runner
  runner:
    name: get-runner
    runs-on: ${{ inputs.runner }}
    outputs:
      runner_id: ${{ steps.runner-info.outputs.runner_id }}
      user_id: ${{ steps.runner-info.outputs.user_id }}
      render_id: ${{ steps.runner-info.outputs.render_id }}
      hostname: ${{ steps.runner-info.outputs.hostname }}
      runner_label: ${{ inputs.runner }}
    steps:
      - name: Clean workspace
        run: sudo find . -maxdepth 1 ! -name '.' ! -name '..' -exec sudo rm -rf {} + 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: torch-xpu-ops

      - name: Get runner information
        id: runner-info
        uses: ./torch-xpu-ops/.github/actions/get-runner

  # Build PyTorch + domain libs + Triton
  build:
    name: build
    needs: runner
    if: contains(inputs.pytorch, '_wheel') == false
    runs-on: ${{ needs.runner.outputs.runner_id }}
    timeout-minutes: 300
    permissions:
      checks: write
    container:
      image: ${{ inputs.docker_image_name }}
      volumes:
        - ${{ github.workspace }}:${{ github.workspace }}
      options: >-
        --rm
        --user root
        --cap-add=SYS_PTRACE
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
    env:
      GH_TOKEN: ${{ github.token }}
      USE_XCCL: 1
      IS_XPU_CI: 1
      TORCH_XPU_ARCH_LIST: ${{ github.event_name == 'pull_request' && 'pvc' || '' }}

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────
      - name: Prepare workspace
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} + 2>/dev/null || true
          mkdir -p "${BUILD_DIR}"

      - name: Install GitHub CLI
        run: |
          command -v gh &>/dev/null && exit 0
          dnf install -y 'dnf-command(config-manager)'
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh --repo gh-cli

      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v6
        with:
          path: ${{ env.TORCH_XPU_OPS_SRC }}
          fetch-depth: 1

      - name: Setup Python ${{ inputs.python }}
        uses: ./.github/actions/setup-build-python
        with:
          python-version: ${{ inputs.python }}

      - name: Setup oneAPI DLE
        if: inputs.component == 'oneapi'
        uses: ./.github/actions/setup-oneapi
        with:
          installer-url: ${{ inputs.component_version }}

      # ── Core build ────────────────────────────────────────────────────────
      - name: Build PyTorch XPU
        uses: ./.github/actions/build-pytorch-xpu
        with:
          build-dir: ${{ env.BUILD_DIR }}
          pytorch: ${{ inputs.pytorch }}
          torch-xpu-ops: ${{ inputs.torch_xpu_ops }}
          component: ${{ inputs.component }}
          component-version: ${{ inputs.component_version }}
          gcc-version: ${{ env.GCC_VERSION }}
          torch-xpu-ops-src: ${{ env.TORCH_XPU_OPS_SRC }}

      # ── Domain libraries ──────────────────────────────────────────────────
      - name: Build TorchVision
        uses: ./.github/actions/build-domain-lib
        with:
          name: torchvision
          repo-url: https://github.com/pytorch/vision.git
          pin-file: vision.txt
          pytorch-src: ${{ env.PYTORCH_SRC }}
          build-dir: ${{ env.BUILD_DIR }}
          gcc-version: ${{ env.GCC_VERSION }}
          os-packages: libpng-devel libjpeg-devel

      - name: Build TorchAudio
        uses: ./.github/actions/build-domain-lib
        with:
          name: torchaudio
          repo-url: https://github.com/pytorch/audio.git
          pin-file: audio.txt
          pytorch-src: ${{ env.PYTORCH_SRC }}
          build-dir: ${{ env.BUILD_DIR }}
          gcc-version: ${{ env.GCC_VERSION }}

      # ── Triton ────────────────────────────────────────────────────────────
      - name: Build or fetch Triton XPU
        uses: ./.github/actions/build-triton-xpu
        with:
          pytorch-src: ${{ env.PYTORCH_SRC }}
          build-dir: ${{ env.BUILD_DIR }}
          triton-spec: ${{ inputs.component == 'triton' && inputs.component_version || '' }}
          gcc-version: ${{ env.GCC_VERSION }}

      # ── Verify ────────────────────────────────────────────────────────────
      - name: Verify build
        uses: ./.github/actions/verify-pytorch-build
        with:
          build-dir: ${{ env.BUILD_DIR }}

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Torch-XPU-Wheel-${{ inputs.category }}-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ inputs.category }}/*.whl
            ${{ inputs.category }}/build_*.log
          retention-days: 7
          if-no-files-found: error

      - name: Cleanup workspace
        if: always()
        run: chmod -R 777 "${WORKSPACE}" /__w /github 2>/dev/null || true
