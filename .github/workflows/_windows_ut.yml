name: Windows Test

on:
  workflow_call:
    inputs:
      pytorch:
        required: false
        type: string
        default: 'main'
        description: Pytorch main by default, or 'commit/branch', or 'repo@commit/repo@branch'
      torch_xpu_ops:
        required: false
        type: string
        default: 'main'
        description: Torch-xpu-ops main by default, 'commit/branch', or 'repo@commit/repo@branch', or 'pinned' for pytorch pin
      ut:
        required: true
        type: string
        default: ''
        description: UT scope. `op_regression,op_regression_dev1,op_extended,op_ut,torch_xpu` Delimiter is comma
      python:
        required: false
        type: string
        default: '3.10'
        description: Python version
      runner:
        required: true
        type: string
        default: 'Windows_CI'
        description: Runner label
      build_runner:
        required: false
        type: string
        default: 'Windows_CI_Build'
        description: Runner label for build job (can be different from ut runner)
      xpu_version:
        required: false
        type: string
        default: '2025.3'
        description: Python version
      src_changed:
        required: true
        type: string
        default: 'false'
        description: Check if filtered file changed
      has_label:
        required: true
        type: string
        default: 'false'
        description: Check if labelled

permissions:
  contents: read

env:
    USE_XPU: 1
    PYTORCH_EXTRA_INSTALL_REQUIREMENTS: >-
      intel-cmplr-lib-rt==2025.3.2 |
      intel-cmplr-lib-ur==2025.3.2 |
      intel-cmplr-lic-rt==2025.3.2 |
      intel-sycl-rt==2025.3.2 |
      onemkl-license==2025.3.1 |
      onemkl-sycl-blas==2025.3.1 |
      onemkl-sycl-dft==2025.3.1 |
      onemkl-sycl-lapack==2025.3.1 |
      onemkl-sycl-rng==2025.3.1 |
      onemkl-sycl-sparse==2025.3.1 |
      dpcpp-cpp-rt==2025.3.2 |
      intel-opencl-rt==2025.3.2 |
      mkl==2025.3.1 |
      intel-openmp==2025.3.2 |
      tbb==2022.3.1 |
      tcmlib==1.4.1 |
      umf==1.0.3 |
      intel-pti==0.16.0

jobs:
  build:
    runs-on: ${{ inputs.build_runner }}
    if: ${{ inputs.src_changed == 'true' || inputs.has_label == 'true' }}
    timeout-minutes: 1000
    outputs:
      torch_whl_name: ${{ steps.find_whl.outputs.torch_whl_name }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v6
      - name: Install oneAPI
        shell: cmd
        env:
          XPU_VERSION: ${{ inputs.xpu_version }}
        run: |
          call .ci\scripts\build\windows\install_xpu.bat
          if errorlevel 1 exit /b 1
      - name: Resolve PyTorch / torch-xpu-ops specs
        shell: cmd
        env:
          PYTORCH: ${{ inputs.pytorch }}
          TORCH_XPU_OPS: ${{ inputs.torch_xpu_ops }}
        run: |
          call .ci\scripts\build\windows\_resolve_specs.bat
          if errorlevel 1 exit /b 1
      - name: Prepare Stock Pytorch
        shell: cmd
        env:
          PYTHON_VERSION: ${{ inputs.python }}
          CONDA_ENV: windows_ci
        run: |
          call .ci\scripts\build\windows\prepare_pytorch.bat
          if errorlevel 1 exit /b 1
      - name: Build Pytorch XPU
        shell: cmd
        env:
          CONDA_ENV: windows_ci
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\build\windows\build_pytorch.bat
          if errorlevel 1 exit /b 1
      - name: Torch Config
        shell: cmd
        env:
          CONDA_ENV: windows_ci
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\torch_config.bat
      - name: Find and Upload Torch Wheel
        id: find_whl
        shell: cmd
        run: |
          call conda activate windows_ci
          cd ../pytorch
          for /r %%i in (dist\torch*.whl) do (
            set TORCH_WHL=%%i
          )
          echo TORCH_WHL=%TORCH_WHL%
          for %%A in ("%TORCH_WHL%") do set WHL_NAME=%%~nxA
          echo torch_whl_name=%WHL_NAME% >> %GITHUB_OUTPUT%
          echo "[INFO] wheel name: %WHL_NAME%"
      - name: Upload Windows build log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: Torch-XPU-Windows-Log-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: 'C:\actions-runner\_work\torch-xpu-ops\pytorch\build_torch_wheel_log.log'
      - name: Upload Windows binary
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: Torch-XPU-Windows-Binary-${{ github.event.pull_request.number || github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: 'C:\actions-runner\_work\torch-xpu-ops\pytorch\dist'
          compression-level: 0

  ut_test:
    needs: [build]
    runs-on: ${{ inputs.runner }}
    if: ${{ inputs.src_changed == 'true' || inputs.has_label == 'true' }}
    timeout-minutes: 1000
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v6
      - name: Clean old wheel artifacts
        shell: cmd
        run: |
          if exist "%GITHUB_WORKSPACE%\wheel_artifact" rmdir /s /q "%GITHUB_WORKSPACE%\wheel_artifact"
      - name: Download Torch Wheel
        uses: actions/download-artifact@v8
        with:
          pattern: Torch-XPU-Windows-Binary-${{ github.event.pull_request.number || github.sha }}-*
          path: ${{ github.workspace }}/wheel_artifact
      - name: Install oneAPI (for UT runtime)
        shell: cmd
        env:
          XPU_VERSION: ${{ inputs.xpu_version }}
        run: |
          call .ci\scripts\build\windows\install_xpu.bat
          if errorlevel 1 exit /b 1
      - name: Resolve PyTorch / torch-xpu-ops specs
        shell: cmd
        env:
          PYTORCH: ${{ inputs.pytorch }}
          TORCH_XPU_OPS: ${{ inputs.torch_xpu_ops }}
        run: |
          call .ci\scripts\build\windows\_resolve_specs.bat
          if errorlevel 1 exit /b 1
      - name: Setup Python Environment
        shell: cmd
        env:
          PYTHON_VERSION: ${{ inputs.python }}
          CONDA_ENV: windows_ut
        run: |
          call .ci\scripts\ut\windows\setup_pytorch.bat
          if errorlevel 1 exit /b 1
      - name: Install PyTorch Wheel and Dependencies
        shell: cmd
        env:
          CONDA_ENV: windows_ut
          WHEEL_DIR: ${{ github.workspace }}\wheel_artifact
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\install_torch_wheel.bat
          if errorlevel 1 exit /b 1
      - name: Torch Config Check
        shell: cmd
        env:
          CONDA_ENV: windows_ut
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\torch_config.bat
      - name: Run XPU OP Extended UT
        if: contains(inputs.ut, 'op_extended') || github.event_name == 'schedule'
        shell: cmd
        continue-on-error: true
        env:
          CONDA_ENV: windows_ut
          ONEAPI_VARS: '0'
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\run_op_extended.bat
      - name: Run CPP Extensions AOT SYCL UT
        if: contains(inputs.ut, 'test_xpu') || github.event_name == 'schedule'
        shell: cmd
        continue-on-error: true
        env:
          CONDA_ENV: windows_ut
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\run_test_xpu_cpp_ext.bat
      - name: Run Test XPU UT
        if: false
        shell: cmd
        continue-on-error: true
        env:
          CONDA_ENV: windows_ut
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\run_test_xpu.bat
      - name: Run OP UT
        if: contains(inputs.ut, 'op_ut') || github.event_name == 'schedule'
        shell: cmd
        continue-on-error: true
        env:
          CONDA_ENV: windows_ut
          ONEAPI_VARS: '0'
        run: |
          call %GITHUB_WORKSPACE%\.ci\scripts\ut\windows\run_op_ut.bat
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: "${{ github.workspace }}/ut_log"
          if-no-files-found: ignore

  summary:
    needs: [ut_test]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v6
      - name: Setup python-${{ inputs.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python }}
      - name: Download XPU UT Logs
        uses: actions/download-artifact@v8
        with:
          pattern: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-*
          path: ${{ github.workspace }}/ut_log
      - name: UT Test Results Summary
        shell: bash
        run: |
          pip install junitparser
          find . -type f -name "*.xml" -exec mv {} ${{ github.workspace }}/ut_log/ \; || true
          python ./.github/scripts/check-ut.py -n ${{ inputs.ut }} -i ${{ github.workspace }}/ut_log/*.xml >> $GITHUB_STEP_SUMMARY || true
          # Check the failure logs
          if ls ${{ github.workspace }}/failures*.log 1> /dev/null 2>&1; then
            echo -e "Exist Failure logs"
            echo "Found Failure logs as below: "
            for file in ${{ github.workspace }}/failures*.log; do
              echo "  - $file"
              cp "$file" ${{ github.workspace }}/ut_log
            done
            echo -e "Failure logs Copied"
          else
            echo -e "No Failure logs"
          fi
          # Copied the passed logs
          if ls passed*.log 1> /dev/null 2>&1; then
            cp passed*.log ${{ github.workspace }}/ut_log
            echo -e "Passed logs Copied"
          else
            echo -e "No Passed logs"
          fi
          # Copied the Summary logs
          if ls category*.log 1> /dev/null 2>&1; then
            cp category*.log ${{ github.workspace }}/ut_log
            echo -e "Category logs Copied"
          else
            echo -e "No Category logs"
          fi
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          overwrite: true

  summary_check:
    needs: [summary]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout torch-xpu-ops
        uses: actions/checkout@v6
      - name: Download XPU UT Logs
        uses: actions/download-artifact@v8
        with:
          pattern: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-*
          path: ${{ github.workspace }}/ut_log
      - name: Check UT Results
        uses: ./.github/actions/summarize-windows-ut
        with:
          ut: ${{ inputs.ut }}
          artifact-glob: 'Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-*'
          ut-log-dir: ${{ github.workspace }}/ut_log
          github-token: ${{ github.token }}
      - name: Upload Inductor XPU UT Log
        if: ${{ ! cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: Inductor-XPU-UT-Data-${{ github.event.pull_request.number || github.sha }}-Windows-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ut_log
          overwrite: true
