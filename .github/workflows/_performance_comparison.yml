name: Performance Comparison

on:
  workflow_dispatch:
    inputs:
      target:
        required: true
        type: string
        default: ''
        description: Target artifact id
      baseline:
        required: true
        type: string
        default: ''
        description: Baseline artifact id

permissions: read-all

jobs:
  Performance-Comparison:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install gh
        run: |
          sudo apt update
          sudo apt install -y gh python3-dev python3-pip python3-venv git
      - name: Cleanup workspace
        run: |
          rm -rf ./*
      - name: Get comparison artifacts
        run: |
          gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                /repos/intel/torch-xpu-ops/actions/artifacts/${{ inputs.target }}/zip > target.zip
          gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                /repos/intel/torch-xpu-ops/actions/artifacts/${{ inputs.baseline }}/zip > baseline.zip
          mkdir target baseline
          unzip target.zip -d target
          unzip baseline.zip -d baseline
      - name: Comparison result
        run: |
          git clone https://github.com/mengfei25/torch-xpu-ops xpu
          python3 -m pip install pandas
          python3 xpu/.github/scripts/perf_comparison.py -xpu target -refer baseline >> ${GITHUB_STEP_SUMMARY}
