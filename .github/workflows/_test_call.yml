name: Test Workflow Call

on:
  workflow_call:
    inputs:
      # ----- Basic Configuration -----
      pytorch:
        type: string
        required: true
        default: ''
        description: PyTorch version
      torch_xpu_ops:
        type: string
        required: false
        default: ''
        description: Torch-xpu-ops version
      runner:
        type: string
        required: true
        description: Runner label for test execution
      python:
        type: string
        required: true
        description: Python version

      # ----- Component Build (Optional) -----
      component:
        type: string
        required: false
        default: ''
        description: Optional component to build
      component_version:
        type: string
        required: false
        default: ''
        description: Optional component version to build

      # ----- Unit Tests -----
      ut:
        type: string
        required: false
        default: ''
        description: Unit test scope (comma-separated)

      # ----- E2E Parameters -----
      suite:
        type: string
        required: false
        default: ''
        description: E2E test suites (comma-separated)
      dt:
        type: string
        required: false
        default: ''
        description: E2E test dtypes (comma-separated)
      mode:
        type: string
        required: false
        default: ''
        description: E2E test modes (comma-separated)
      scenario:
        type: string
        required: false
        default: ''
        description: E2E test scenarios (comma-separated)
      model:
        type: string
        required: false
        default: ''
        description: E2E test specific model names (comma-separated)

      # ----- Comparison Parameters -----
      category:
        type: string
        required: false
        default: ''
        description: Distinguish the target or baseline

permissions:
  contents: read

jobs:
  # Prepare: convert comma-separated inputs to JSON arrays for matrix strategy
  tests-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      ut_json:           ${{ steps.matrix.outputs.ut_json }}
      e2e_json:          ${{ steps.matrix.outputs.e2e_json }}
      distributed_json:  ${{ steps.matrix.outputs.distributed_json }}
    steps:
      - name: Build matrix JSON arrays
        id: matrix
        run: |
          csv_to_json() {
            local input="$1" filter_distributed="${2:-keep}"
            if [ -z "$input" ]; then
              echo "[]"
              return
            fi
            local json="[" sep=""
            IFS=',' read -ra items <<< "$input"
            for x in "${items[@]}"; do
              x="${x#"${x%%[![:space:]]*}"}"   # trim leading
              x="${x%"${x##*[![:space:]]}"}"   # trim trailing
              [[ "$x" == "windows" || "$x" == "microbench" || -z "$x" ]] && continue
              # distributed suites are dispatched to _linux_distributed.yml
              if [[ "$filter_distributed" == "drop" && "$x" == *distributed* ]]; then continue; fi
              if [[ "$filter_distributed" == "only" && "$x" != *distributed* ]]; then continue; fi
              json+="${sep}\"${x}\""
              sep=","
            done
            json+="]"
            echo "$json"
          }

          ut_json="$(csv_to_json "${{ inputs.ut }}" drop)"
          distributed_json="$(csv_to_json "${{ inputs.ut }}" only)"
          e2e_json="$(csv_to_json "${{ inputs.suite }}")"

          echo "ut_json=${ut_json}"                   >> "$GITHUB_OUTPUT"
          echo "distributed_json=${distributed_json}" >> "$GITHUB_OUTPUT"
          echo "e2e_json=${e2e_json}"                 >> "$GITHUB_OUTPUT"

  # Build
  linux-build:
    permissions:
      contents: read
      checks: write
    secrets: inherit
    uses: ./.github/workflows/_linux_build.yml
    with:
      runner: ${{ inputs.runner }}
      python: ${{ inputs.python }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  # Linux Unit Tests
  linux-ut:
    needs: [linux-build, tests-matrix]
    if: needs.tests-matrix.outputs.ut_json != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        ut_name: ${{ fromJSON(needs.tests-matrix.outputs.ut_json) }}
    uses: ./.github/workflows/_linux_ut.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      python: ${{ inputs.python }}
      ut: ${{ matrix.ut_name }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  # Linux Distributed Tests (baremetal, separate workflow)
  linux-distributed:
    needs: [linux-build, tests-matrix]
    if: needs.tests-matrix.outputs.distributed_json != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        ut_name: ${{ fromJSON(needs.tests-matrix.outputs.distributed_json) }}
    uses: ./.github/workflows/_linux_distributed.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      python: ${{ inputs.python }}
      ut: ${{ matrix.ut_name }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  # Linux E2E Tests
  linux-e2e:
    needs: [linux-build, tests-matrix]
    if: needs.tests-matrix.outputs.e2e_json != '[]'
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.tests-matrix.outputs.e2e_json) }}
    uses: ./.github/workflows/_linux_e2e.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      python: ${{ inputs.python }}
      suite: ${{ matrix.suite }}
      dt: ${{ inputs.dt }}
      mode: ${{ inputs.mode }}
      scenario: ${{ inputs.scenario }}
      model: ${{ inputs.model }}
      category: ${{ inputs.category }}
      component: ${{ inputs.component }}
      component_version: ${{ inputs.component_version }}

  # Linux Microbenchmarks
  linux-microbench:
    needs: linux-build
    if: contains(inputs.ut, 'microbench')
    permissions:
      contents: read
      issues: write
      actions: read
    secrets: inherit
    uses: ./.github/workflows/_linux_op_benchmark.yml
    with:
      runner: ${{ inputs.runner }}
      pytorch: ${{ inputs.pytorch }}
      python: ${{ inputs.python }}

  # Windows Unit Tests
  windows-ut:
    if: contains(inputs.ut, 'windows')
    secrets: inherit
    uses: ./.github/workflows/_windows_ut.yml
    with:
      ut: 'op_extended,test_xpu,op_ut_windows'
      python: ${{ inputs.python }}
      src_changed: false
      has_label: true
      build_runner: Windows_CI_Build
      runner: Windows_CI
      torch_xpu_ops: ${{ inputs.torch_xpu_ops }}
      pytorch: ${{ inputs.pytorch }}

  # Compare Results
  compare-results:
    if: >-
      inputs.category != 'target' && inputs.category != 'baseline' &&
      !cancelled() &&
      (needs.linux-ut.result != 'skipped' || needs.linux-e2e.result != 'skipped')
    needs: [linux-ut, linux-e2e]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Collect and compare results
        uses: ./.github/actions/collect-results
        with:
          baseline-issue: '1645'
          issue-prefix: 'PVC -'
          pytorch-input: ${{ inputs.pytorch }}
          update-baseline: ${{ github.event_name == 'schedule' }}
          github-token: ${{ github.token }}

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-summary
          path: |
            *_comparison*.csv
            *_comparison*.xlsx
            *_comparison*.md
          retention-days: 30
          if-no-files-found: warn
